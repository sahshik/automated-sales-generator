version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile

    ports:
      - "8000:8000"

    depends_on:
      - redis
      - neo4j

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5

    environment:
      - NEO4J_AUTH=neo4j/password

    ports:
      - "7474:7474"
      - "7687:7687"